# nginx/default.conf
# Default server for health checks
server {
    listen 80;
    server_name _;

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://appraisal.company.com$request_uri;
    }
}
