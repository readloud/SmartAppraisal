services:
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    container_name: appraisal_postgres_dev
    environment:
      POSTGRES_USER: appraiser
      POSTGRES_PASSWORD: secure_password_here
      POSTGRES_DB: appraisal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appraiser -d appraisal"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - appraisal_network

  redis:
    build:
      context: ./redis
      dockerfile: Dockerfile
    container_name: appraisal_redis_dev
    environment:
      REDIS_PASSWORD: secure_redis_password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - appraisal_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: appraisal_backend_dev
    environment:
      DATABASE_URL: postgresql://appraiser:secure_password_here@postgres:5432/appraisal
      REDIS_URL: redis://:secure_redis_password@redis:6379
      SECRET_KEY: dev_secret_key_12345
      DEBUG: "True"
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - appraisal_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: appraisal_frontend_dev
    environment:
      REACT_APP_API_URL: http://localhost:8000/api
      REACT_APP_WS_URL: ws://localhost:8000/ws
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - appraisal_network
    command: npm start

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: appraisal_nginx_dev
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - appraisal_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: appraisal_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@company.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - appraisal_network

volumes:
  postgres_data:
  redis_data:
  backend_logs:
  nginx_logs:

networks:
  appraisal_network:
    driver: bridge
